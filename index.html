<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping List</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<h1>Interactive Shopping List</h1>
<div id="container">
    <div id="input section">
        <input type="text" id="itemInput" placeholder="Item name">
        <input type="number" id="itemPrice" placeholder="Price">    
    </div>
    <button id= "addBtn" class="button" onclick="submitData()">Add Item</button>
    <div id="section"></div>
    <div id="shoppingList">
        <div class="result-border">
            <p id="itemButton"></p>
            <p id="priceButton"></p>
        </div>
    </div>
    <div id="totalDisplay"></div>
 
    <button id="clearBtn" class="button" onclick="clearList()">Clear List</button>
</div>
<script src="main.js"></script>   
</body>
</html>
